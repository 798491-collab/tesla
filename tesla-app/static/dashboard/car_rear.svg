<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" fill="none">
  <!-- Tesla Model Y Rear View - White outline on transparent -->
  <g stroke="white" stroke-width="2" fill="none" opacity="0.9">
    <!-- Body outline -->
    <path d="M20,180 L20,60 C20,45 30,30 45,25 L55,22 C60,20 65,18 75,18 L85,18 C90,18 95,20 100,22 L105,25 C110,28 115,35 118,50 L118,180"/>
    <!-- Roof -->
    <path d="M45,25 L55,22 C65,18 85,18 100,22 L105,25"/>
    <!-- Rear window -->
    <path d="M35,55 L40,35 C50,28 70,25 85,28 L95,35 L100,55 Z" fill="rgba(255,255,255,0.06)"/>
    <!-- Taillights -->
    <rect x="22" y="70" width="20" height="6" rx="2" fill="rgba(255,50,50,0.5)" stroke="none"/>
    <rect x="96" y="70" width="20" height="6" rx="2" fill="rgba(255,50,50,0.5)" stroke="none"/>
    <!-- License plate area -->
    <rect x="45" y="100" width="30" height="18" rx="2" stroke-width="1" opacity="0.3"/>
    <!-- Left wheel -->
    <ellipse cx="22" cy="160" rx="12" ry="18" stroke-width="2"/>
    <!-- Right wheel -->
    <ellipse cx="118" cy="160" rx="12" ry="18" stroke-width="2"/>
    <!-- Bumper line -->
    <line x1="25" y1="140" x2="115" y2="140" stroke-width="0.8" opacity="0.3"/>
  </g>
</svg>